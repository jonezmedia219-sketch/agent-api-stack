services:
  - type: web
    name: agent-api-stack
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 8000
      - key: HTTP_TIMEOUT_SECONDS
        value: 15
      - key: HTTP_MAX_RESPONSE_BYTES
        value: 2000000
      - key: STRUCTURED_WEB_MAX_HTML_CHARS
        value: 500000
      - key: STRUCTURED_WEB_MAX_LINKS
        value: 100
      - key: REQUEST_MAX_BODY_BYTES
        value: 1000000
      - key: RATE_LIMIT_REQUESTS
        value: 60
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: ENABLE_METERING
        value: true
      - key: ENABLE_PAYMENT_ENFORCEMENT
        value: false
      - key: PAYMENT_SHADOW_MODE
        value: true
      - key: PAYMENT_VERIFIER
        value: stub
      - key: PAYMENT_CHAIN
        value: base
      - key: PAYMENT_TOKEN
        value: USDC
      - key: PAYMENT_RECEIVER_WALLET
        value: 0xa850773dDdAc7051c9434E3b1e804531C12d265c
      - key: PAYMENT_MAX_SKEW_SECONDS
        value: 300
      - key: PAYMENT_REQUIRE_NONCE
        value: true
      - key: PAYMENT_SHARED_SECRET
        sync: false
      - key: BASE_RPC_URL
        value: https://mainnet.base.org
      - key: PAYMENT_TOKEN_CONTRACT
        value: 0x833589fCD6EDB6E08f4c7C32D4f71b54bdA02913
      - key: PAYMENT_MIN_CONFIRMATIONS
        value: 1
