services:
  - type: web
    name: agent-api-stack
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 8000
      - key: HTTP_TIMEOUT_SECONDS
        value: 15
      - key: HTTP_MAX_RESPONSE_BYTES
        value: 2000000
      - key: STRUCTURED_WEB_MAX_HTML_CHARS
        value: 500000
      - key: STRUCTURED_WEB_MAX_LINKS
        value: 100
      - key: REQUEST_MAX_BODY_BYTES
        value: 1000000
      - key: RATE_LIMIT_REQUESTS
        value: 60
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: ENABLE_METERING
        value: true
      - key: ENABLE_PAYMENT_ENFORCEMENT
        value: false
      - key: PAYMENT_SHADOW_MODE
        value: true
      - key: PAYMENT_VERIFIER
        value: stub
